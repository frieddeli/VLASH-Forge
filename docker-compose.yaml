services:
  train:
    build: .
    image: vlash-forge:latest
    runtime: nvidia
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/scratch/.cache/huggingface
      - DATASET_REPO_ID=${DATASET_REPO_ID}
      - NUM_GPUS=${NUM_GPUS:-4}
      # deepspeed (default, LoRA fine-tuning) or fsdp (full fine-tuning)
      - TRAIN_BACKEND=${TRAIN_BACKEND:-deepspeed}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      # Single bind-mount: host persistent storage → /scratch inside container.
      # Set SCRATCH in .env or your shell to your mounted disk path.
      # See .env.example for all required variables.
      - ${SCRATCH}:/scratch
    command: examples/train/pi05/cloud.yaml
    # NCCL requires shared memory and host networking for multi-GPU communication
    ipc: host
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
