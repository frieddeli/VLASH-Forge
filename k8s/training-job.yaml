apiVersion: batch/v1
kind: Job
metadata:
  name: vlash-train
  labels:
    app: vlash
spec:
  # Retry on node failure but not on training errors (OOM, bad config, etc.)
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      # Required for NCCL shared memory buffers across processes
      hostIPC: true
      containers:
        - name: train
          image: frieddeli/vlash-forge:latest
          imagePullPolicy: Always
          args: ["examples/train/pi05/cloud.yaml"]
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: token
            - name: HF_HOME
              value: /scratch/.cache/huggingface
            - name: DATASET_REPO_ID
              value: ""   # set via: kubectl create secret or patch the job
            - name: NUM_GPUS
              value: "4"
            - name: TRAIN_BACKEND
              value: "deepspeed"
            # Optional: uncomment to enable W&B experiment tracking
            # - name: WANDB_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: wandb-secret
            #       key: api-key
          resources:
            limits:
              nvidia.com/gpu: 4
            requests:
              nvidia.com/gpu: 4
              memory: "64Gi"
              cpu: "8"
          volumeMounts:
            - name: scratch
              mountPath: /scratch
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: scratch-pvc

# ── Prerequisites ─────────────────────────────────────────────────────────────
# 1. Create HuggingFace token secret:
#    kubectl create secret generic hf-secret --from-literal=token=<YOUR_HF_TOKEN>
#
# 2. Create a single PVC for /scratch (model cache + dataset + outputs):
#    kubectl apply -f - <<'EOF'
#    apiVersion: v1
#    kind: PersistentVolumeClaim
#    metadata:
#      name: scratch-pvc
#    spec:
#      accessModes: [ReadWriteOnce]
#      resources:
#        requests:
#          storage: 200Gi   # ~10GB model + dataset + checkpoints
#    EOF
#
# 3. Set your dataset repo ID (edit the DATASET_REPO_ID env var above, or patch):
#    kubectl patch job vlash-train --type=json \
#      -p='[{"op":"replace","path":"/spec/template/spec/containers/0/env/2/value","value":"your-org/your-dataset"}]'
#
# 4. Submit and monitor:
#    kubectl apply -f k8s/training-job.yaml
#    kubectl logs -f job/vlash-train
#
# Inside /scratch the layout is:
#   /scratch/.cache/huggingface/  ← HF_HOME: base model weights (~10 GB)
#   /scratch/.cache/lerobot/      ← dataset cache
#   /scratch/outputs/             ← training checkpoints
