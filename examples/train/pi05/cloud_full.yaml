# Full fine-tuning config for pi0.5 — no LoRA, all parameters trained.
#
# Use with FSDP backend:
#   TRAIN_BACKEND=fsdp ./scripts/train.sh examples/train/pi05/cloud_full.yaml
#
# GPU requirements: ~40 GB per GPU.
# Recommended: 4×A100 40GB or 2×A100 80GB.
# For pi0 (3B): 4×A100 80GB or 4×H100.
#
# If you hit OOM, in order of impact:
#   1. Set gradient_checkpointing: true in policy section
#   2. Reduce batch_size to 1 (already set here)
#   3. Increase grad_accum_steps to maintain effective batch size
#   4. Switch to LoRA (use cloud.yaml instead) — cuts trainable params by ~95%

policy:
  type: pi05
  pretrained_path: lerobot/pi05_base
  push_to_hub: false
  # repo_id: your-org/vlash-models-full
  dtype: bfloat16
  device: cuda
  state_cond: true
  gradient_checkpointing: true   # recompute activations to save memory; ~20% slower

dataset:
  repo_id: ${DATASET_REPO_ID}
  root: /scratch/.cache/lerobot
  video_backend: torchcodec

output_dir: /scratch/outputs/pi05_cloud_full
job_name: pi05_cloud_full

batch_size: 1
grad_accum_steps: 8   # effective batch size: 1 x NUM_GPUS x 8
steps: 50000
num_workers: 4
seed: 1000

use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 2.0e-5            # lower lr for full fine-tuning vs LoRA
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10

scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  peak_lr: 2.0e-5
  decay_lr: 1.0e-6
  num_decay_steps: 50000

save_checkpoint: true
save_freq: 10000

log_freq: 200
wandb:
  enable: false
  project: vlash
  entity: null
  disable_artifact: true

max_delay_steps: 8

lora:
  enable: false   # ← full fine-tuning; all parameters are trained
