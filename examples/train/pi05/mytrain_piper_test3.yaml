policy:
  type: pi05
  # CRITICAL: Point this to the folder you just downloaded
  pretrained_path: /scratch/users/ntu/m230060/vlash_models/pi05_base
  push_to_hub: false
  dtype: bfloat16
  device: cuda
  state_cond: true
  gradient_checkpointing: true  # ADDED: Crucial to save memory during full-param tuning

# Dataset Configuration
dataset:
  repo_id: /scratch/users/ntu/m230060/comp4901/test3
  video_backend: pyav
  use_imagenet_stats: false

# Use absolute paths for the output to avoid "lost" logs
output_dir: /scratch/users/ntu/m230060/outputs/train/pi05_piper_test3
job_name: pi05_piper_test3
batch_size: 2                 # CHANGED: Reduced from 8 to 1 to fit in VRAM
steps: 20000
num_workers: 16 # Good choice; matches the TSK 32 CPUs you're getting
seed: 1000
grad_accum_steps: 4          # CHANGED: Increased from 2 to 16 to maintain effective batch size

use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
  grad_clip_norm: 1.0
scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  peak_lr: 5.0e-5
  decay_lr: 2.5e-6
  num_decay_steps: 20000 # Aligned with training steps

save_checkpoint: true
save_freq: 5000
log_freq: 100
wandb:
  enable: false
  project: vlash
  entity: null
  disable_artifact: true

max_delay_steps: 8
shared_observation: true