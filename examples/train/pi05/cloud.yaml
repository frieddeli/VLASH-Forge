# Cloud/HPC training config for pi0.5 with LoRA + DeepSpeed ZeRO-2.
# Designed to run inside the Docker/Singularity container on any GPU instance.
#
# ── Runtime environment variables (set before singularity run / docker run) ──
#   HF_TOKEN          - HuggingFace token (required: gated model download + Hub push)
#   DATASET_REPO_ID   - HF dataset repo, e.g. "your-org/your-dataset"
#   NUM_GPUS          - number of GPUs to use (default: 1)
#   WANDB_API_KEY     - W&B API key (required when wandb.enable: true below)
#
# ── First-time dataset upload ─────────────────────────────────────────────────
#   huggingface-cli repo create your-dataset-name --type dataset --private
#   huggingface-cli upload your-org/your-dataset /path/to/local/dataset/ --repo-type dataset
#
# ── Local workstation (no container) ─────────────────────────────────────────
#   Override any flag on the CLI, e.g.:
#     vlash train examples/train/pi05/cloud.yaml \
#       dataset.repo_id=/absolute/path/to/local/dataset \   # local path skips HF download
#       dataset.video_backend=pyav \                        # pyav needs no GPU decoder
#       output_dir=outputs/pi05_local \
#       num_workers=2 \
#       batch_size=1 \
#       grad_accum_steps=4

policy:
  type: pi05
  # LOCAL: replace with an absolute path to a pre-downloaded model folder
  #   pretrained_path: /path/to/pi05_base
  # CLOUD: HF Hub ID — downloaded at runtime using HF_TOKEN; cached in HF_HOME
  pretrained_path: lerobot/pi05_base

  # Set push_to_hub: true to auto-upload the final checkpoint to HF Hub after training.
  # The generated model card will reference dataset.repo_id as the training source.
  # Intermediate checkpoints are written to output_dir only.
  push_to_hub: false
  # repo_id: your-org/vlash-models   # ← required when push_to_hub: true
  # private: true                    # ← false to make the model public

  dtype: bfloat16
  device: cuda
  state_cond: true

dataset:
  # CLOUD: set via DATASET_REPO_ID env var → HF Hub dataset, auto-downloaded at runtime
  # LOCAL: pass an absolute path on the CLI (dataset.repo_id=/your/path) to skip HF entirely
  repo_id: ${DATASET_REPO_ID}

  # Dataset cache inside the container — lives on the /scratch bind-mount so it
  # persists across runs and is not re-downloaded on every container restart.
  # LOCAL swap: omit root entirely to use the default ~/.cache/lerobot
  root: /scratch/.cache/lerobot

  # torchcodec: GPU-accelerated decoder, best on cloud/HPC (requires CUDA)
  # LOCAL swap: pyav — CPU decoder, works everywhere, no extra setup
  video_backend: torchcodec

# Checkpoints written to /scratch so they survive container exit.
# /scratch is bind-mounted from the host by scripts/train.sh.
# LOCAL swap: output_dir: outputs/pi05_local  (relative path)
output_dir: /scratch/outputs/pi05_cloud
job_name: pi05_cloud

batch_size: 1
grad_accum_steps: 8   # effective batch size per optimizer step: 1 x NUM_GPUS x 8
# LOCAL swap: reduce grad_accum_steps to 4 or 2 if running on a single smaller GPU
steps: 50000
num_workers: 4
# LOCAL swap: num_workers: 2 (scale to your CPU count; too many workers hurt on laptop)
seed: 1000

use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10

scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  peak_lr: 5.0e-5
  decay_lr: 2.5e-6
  num_decay_steps: 50000

save_checkpoint: true
save_freq: 10000

log_freq: 200

# ── Weights & Biases experiment tracking ──────────────────────────────────────
# To enable: set enable: true and export WANDB_API_KEY=your_key in your job script.
# W&B streams loss, grad_norm, lr, and policy auxiliary metrics every log_freq steps.
# disable_artifact: true keeps checkpoint files local only; set false to also upload
# checkpoint artifacts to W&B as versioned model artifacts.
wandb:
  enable: false
  project: vlash
  entity: null   # set to your W&B team/org name if using a shared workspace
  disable_artifact: true

max_delay_steps: 8

lora:
  enable: true
  backend: peft
  extra_trainable_modules:
    - action_in_proj
    - action_out_proj
    - time_mlp_in
    - time_mlp_out
    - state_proj
    - state_mlp_in
    - state_mlp_out
    - embeddings
    - input_layernorm
    - post_attention_layernorm
  r: 16
  alpha: 16
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - out_proj
    - fc1
    - fc2
