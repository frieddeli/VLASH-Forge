# Cloud-agnostic training config for pi0.5 with LoRA + DeepSpeed ZeRO-2.
# Designed to run inside the Docker/Singularity container on any cloud GPU instance.
#
# Required environment variables:
#   HF_TOKEN          - HuggingFace token (needed for gated models + Hub push)
#   DATASET_REPO_ID   - HuggingFace dataset repo ID, e.g. "your-org/your-dataset"
#
#   Upload your dataset first (LeRobot format, preserving data/videos/meta/ structure):
#     huggingface-cli repo create your-dataset-name --type dataset --private
#     huggingface-cli upload your-org/your-dataset /path/to/local/dataset/ --repo-type dataset
#
# Optional:
#   NUM_GPUS          - number of GPUs (default: 1, set in docker-entrypoint.sh)
#   WANDB_API_KEY     - W&B API key for logging

policy:
  type: pi05
  pretrained_path: lerobot/pi05_base   # downloaded at runtime via HF_TOKEN

  # Hub push: set push_to_hub: true and fill in repo_id to automatically upload
  # the final LoRA checkpoint + model card after training completes.
  # The model card will reference dataset.repo_id as the training dataset.
  # Intermediate checkpoints are saved locally to output_dir only.
  push_to_hub: false
  # repo_id: your-org/vlash-models     # ← uncomment and set when push_to_hub: true
  # private: true                       # ← set false to make the model public

  dtype: bfloat16
  device: cuda
  state_cond: true

dataset:
  repo_id: ${DATASET_REPO_ID}          # e.g. your-org/your-dataset
  video_backend: torchcodec

output_dir: /workspace/outputs/pi05_cloud
job_name: pi05_cloud

batch_size: 1
grad_accum_steps: 8   # effective batch size: 1 x 8 = 8
steps: 50000
num_workers: 4
seed: 1000

use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10

scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  peak_lr: 5.0e-5
  decay_lr: 2.5e-6
  num_decay_steps: 50000

save_checkpoint: true
save_freq: 10000

log_freq: 200
wandb:
  enable: false   # set to true and provide WANDB_API_KEY to enable
  project: vlash
  entity: null
  disable_artifact: true

max_delay_steps: 8

lora:
  enable: true
  backend: peft
  extra_trainable_modules:
    - action_in_proj
    - action_out_proj
    - time_mlp_in
    - time_mlp_out
    - state_proj
    - state_mlp_in
    - state_mlp_out
    - embeddings
    - input_layernorm
    - post_attention_layernorm
  r: 16
  alpha: 16
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - out_proj
    - fc1
    - fc2
