policy:
  type: pi05
  pretrained_path: lerobot/pi05_base
  push_to_hub: false
  dtype: bfloat16
  device: cuda
  state_cond: true

# Dataset配置（与同步版一致）
dataset:
  repo_id: /home/orin/vlash/comp4901/test1  # 完整绝对路径
  video_backend: pyav
  use_imagenet_stats: false


output_dir: outputs/train/pi05_async_jetson
job_name: pi05_async_jetson
batch_size: 8               
steps: 50000
num_workers: 1               
seed: 1000
grad_accum_steps: 2


use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10
scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  peak_lr: 5.0e-5
  decay_lr: 2.5e-6
  num_decay_steps: 50000


save_checkpoint: true
save_freq: 5000
log_freq: 100
wandb:
  enable: false
  project: vlash
  entity: null
  disable_artifact: true


max_delay_steps: 8  
shared_observation: true  