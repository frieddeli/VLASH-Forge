# Accelerate + DeepSpeed ZeRO-2 configuration for VLASH distributed training.
#
# Usage: accelerate launch --config_file deepspeed_config.yaml --num_processes <N> -m vlash.train <config.yaml>
# The --num_processes flag passed at runtime overrides num_processes below.

compute_environment: LOCAL_MACHINE
debug: false
distributed_type: DEEPSPEED

# Mixed precision: bf16 is numerically stable and natively supported on A100/H100/4090.
# V100 (AWS p3, common in older HPC nodes) does NOT support bf16 natively — PyTorch
# will silently emulate it in fp32, negating the memory benefit. Switch to fp16 on V100:
#   mixed_precision: fp16
# fp16 is less numerically stable for large models; use a lower lr and watch for loss spikes.
mixed_precision: bf16
downcast_bf16: 'no'

# ── Single-node constraint ────────────────────────────────────────────────────
# This config targets 1–N GPUs on a SINGLE machine (one HPC node or one cloud VM).
# compute_environment: LOCAL_MACHINE and rdzv_backend: static are correct for this case.
#
# Multi-node (multiple machines communicating over a network) requires:
#   num_machines: <total machines>
#   main_process_ip: <IP of rank-0 machine>
#   main_process_port: 29500
#   machine_rank: <0 on head, 1/2/... on workers>  ← different per node
#   rdzv_backend: c10d
#
# Multi-node is not supported out of the box because each node needs a different
# machine_rank injected at launch time — this requires MPI, SLURM srun --multi-prog,
# or a Kubernetes operator to distribute the right rank to each pod/node.
# For this project, single-node (up to 8×H100 on one DGX) covers the target scale.
num_machines: 1
num_processes: 4   # overridden at runtime by --num_processes; serves as documentation default
machine_rank: 0

# static rendezvous: all processes on localhost, no network discovery needed.
# Switch to c10d for multi-node.
rdzv_backend: static
same_network: true
use_cpu: false

deepspeed_config:
  # ZeRO stage 2: shards optimizer states and gradients across GPUs.
  # This halves per-GPU memory vs DDP while keeping parameter access local
  # (unlike ZeRO-3 which also shards parameters, adding more communication overhead).
  zero_stage: 2
  zero3_init_flag: false

  # Gradient accumulation: effective batch = batch_size x grad_accum_steps x num_gpus.
  # Set to 1 here; controlled per-run by the training config YAML.
  gradient_accumulation_steps: 1

  # Clip gradient norm to prevent training instability with large VLA models.
  gradient_clipping: 1.0

  # Optimizer and parameter offload to CPU RAM — disabled.
  # Enabling offload_optimizer reduces GPU memory at the cost of 2–4× slower training.
  offload_optimizer_device: none
  offload_param_device: none
